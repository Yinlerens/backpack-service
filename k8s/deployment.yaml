apiVersion: apps/v1
kind: Deployment
metadata:
  name: backpack-service
  namespace: backpack-service
  labels:
    app.kubernetes.io/name: backpack-service
    app.kubernetes.io/part-of: backpack-service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backpack-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backpack-service
        app.kubernetes.io/part-of: backpack-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backpack-service
          image: ghcr.io/yinlerens/backpack-service@sha256:d8e0f3b6d3ce78720b60db59be3fb7b87627889e56142e423c566833f9fe87c6
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: MAX_PAGE_LIMIT
              value: "100"
            - name: KAFKA_TOPIC
              value: gacha.pull_completed.v1
            - name: KAFKA_GROUP_ID
              value: backpack-service
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backpack-service-secrets
                  key: database-url
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backpack-service-secrets
                  key: internal-token
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: backpack-service-secrets
                  key: kafka-brokers
          startupProbe:
            httpGet:
              port: http
              path: /health
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              port: http
              path: /ready
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              port: http
              path: /health
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

