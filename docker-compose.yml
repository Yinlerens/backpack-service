services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backpack
      POSTGRES_PASSWORD: backpack
      POSTGRES_DB: backpack
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - backpack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backpack -d backpack"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      - postgres://backpack:backpack@db:5432/backpack?sslmode=disable
      - up

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - backpack_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19093
      - --advertise-kafka-addr
      - internal://kafka:9092,external://127.0.0.1:19093
    ports:
      - "127.0.0.1:19093:19093"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  gacha-engine-service:
    build:
      context: ../gacha-engine-service
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: "8080"
      INTERNAL_TOKEN: local-dev-token
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: gacha.pull_completed.v1
      KAFKA_CLIENT_ID: gacha-engine-service
    ports:
      - "127.0.0.1:8082:8080"

  backpack-service:
    build:
      context: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://backpack:backpack@db:5432/backpack?sslmode=disable
      INTERNAL_TOKEN: local-dev-token
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: gacha.pull_completed.v1
      KAFKA_GROUP_ID: backpack-service
      MAX_PAGE_LIMIT: "100"
    ports:
      - "127.0.0.1:8083:8080"

volumes:
  backpack_pgdata:
  backpack_redis:
